    font-family: 'Segoe UI', Tahoma, sans-serif;

.container {
    text-align: center;
    color: white;
}
.spinner {
    width: 50px;
    height: 50px;

    border-top-color: #0ea5e9;
    border-radius: 50%;

    margin: 0 auto 20px;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}

p { margin: 0; opacity: 0.8; }
a { color: #0ea5e9; text-decoration: none; }
